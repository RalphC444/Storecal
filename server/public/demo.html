<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StoreCal embed demo</title>
  <style>
    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; background: #f4f5f7; color: #222; }
    .demo-hero { padding: 48px 20px; text-align: center; background: #fff; border-bottom: 1px solid #e6e8ec; }
    .demo-hero h1 { margin: 0 0 6px; font-size: 26px; }
    .demo-hero p { margin: 0; color: #6a7078; }
    .demo-mount { max-width: 460px; margin: 32px auto; padding: 0 16px; }
  </style>
</head>
<body>
  <div class="demo-hero">
    <h1>Glamour Hair &amp; Nails</h1>
    <p>This is a fake customer website. The booking widget below is the embed.</p>
  </div>
  <div class="demo-mount">
    <!-- This is exactly the snippet you paste on a real site (data-store = the shop's public key). -->
    <script src="/embed.js" data-store="sc_bdecf02827d97cadda"></script>
  </div>
</body>
</html>

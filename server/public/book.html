<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Book an appointment</title>
  <style>
    :root { --accent: #2563eb; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; color: #111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(160deg, #eef2fb 0%, #f6f7f9 100%);
      padding: 40px 20px 56px;
    }
    .wrap { max-width: 640px; margin: 0 auto; }
    /* When the announcement banner is showing, give the store name breathing room. */
    body.has-banner .wrap { padding-top: 100px; }
    .hero { text-align: center; margin-bottom: 8px; }
    .hero__logo { max-height: 84px; max-width: 220px; margin: 0 auto 16px; display: block; border-radius: 14px; }
    .hero__logo[hidden] { display: none; }
    .hero__name { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 6px; }
    .hero__tag { font-size: 15.5px; color: #5a6069; margin: 0 auto 22px; max-width: 480px; line-height: 1.5; }
    #book-cta { display: flex; justify-content: center; margin-bottom: 18px; min-height: 46px; }
    .links { display: flex; flex-direction: column; gap: 10px; margin: 0 0 4px; }
    .links a {
      display: block; text-align: center; text-decoration: none; font-weight: 600; font-size: 15px;
      padding: 14px 18px; border-radius: 12px; border: 1px solid #e4e7ee; background: #fff; color: #1a1c22;
      box-shadow: 0 1px 2px rgba(16, 18, 28, 0.05); transition: transform .08s ease, border-color .12s ease, box-shadow .12s ease;
    }
    .links a:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(16, 18, 28, 0.08); }
    .sect { margin-top: 34px; }
    .sect__title {
      font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em;
      color: #6b7280; margin: 0 0 14px; padding-bottom: 8px; border-bottom: 1px solid #e6e8ec;
    }
    .foot { margin-top: 40px; text-align: center; font-size: 12px; color: #aab0b8; }
    .err { text-align: center; font-size: 14.5px; color: #c0392b; margin-top: 24px; }

    /* Tune the shared storecal-data.js widgets to sit nicely on this page. */
    .storecal-widget { display: flex; justify-content: center; }
    [data-storecal="services"].scd-grid,
    [data-storecal="staff"].scd-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 520px) {
      [data-storecal="staff"].scd-grid { grid-template-columns: 1fr 1fr; }
    }
    /* The whole service card is the booking target (per-service button hidden);
       hover raises a border in the shop's accent + a "Book →" cue. */
    [data-storecal="services"] .scd-card {
      position: relative; cursor: pointer;
      background: #fff; border: 1px solid #e6e8ec; border-radius: 14px;
      box-shadow: 0 1px 2px rgba(16, 18, 28, 0.04);
      transition: border-color .12s ease, box-shadow .12s ease;
    }
    [data-storecal="services"] .scd-card:hover { border-color: var(--accent); box-shadow: 0 8px 24px rgba(16, 18, 28, 0.10); }
    [data-storecal="services"] .scd-card__book { display: none; } /* replaced by the whole-card click */
    .scd-book-badge { position: absolute; top: 14px; right: 16px; color: var(--accent); font-weight: 700; font-size: 13px;
      opacity: 0; transform: translateX(-4px); transition: opacity .12s ease, transform .12s ease; }
    [data-storecal="services"] .scd-card:hover .scd-book-badge { opacity: 1; transform: none; }
    /* Team cards stay flat (no background). */
    [data-storecal="staff"] .scd-person { background: none; border: 0; box-shadow: none; padding-left: 0; padding-right: 0; }
    /* Our work: tabs (All + per staff) over a photo grid. */
    .gtabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .gtab { padding: 7px 14px; border: 1px solid #e0e3ea; background: #fff; border-radius: 999px; font: inherit;
      font-size: 13.5px; cursor: pointer; color: #444; }
    .gtab.is-active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .ggrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .gshot { margin: 0; }
    .gshot img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; display: block; }
    @media (max-width: 520px) { .ggrid { grid-template-columns: repeat(2, 1fr); } }
    /* Cover photo below the name + Book CTA, above the links. Shows at the
       image's natural aspect (no crop). Hidden until storecal-data sets its src. */
    .cover__img { display: none; width: 100%; height: auto; border-radius: 16px; margin: 4px 0 18px; }
    .cover__img[src] { display: block; }
    /* "Show all" toggle under the gallery preview. */
    .showall { display: block; margin: 14px auto 0; padding: 10px 20px; border: 1px solid var(--accent);
      background: #fff; color: var(--accent); border-radius: 10px; font: inherit; font-size: 14px; font-weight: 600; cursor: pointer; }
    .showall:hover { background: var(--accent); color: #fff; }
    @media (max-width: 560px) {
      body { padding: 24px 14px 48px; }
      .hero__name { font-size: 26px; }
      .sect { margin-top: 26px; }
    }

    /* Skeleton loaders — shown until real content arrives. */
    .skel { position: relative; overflow: hidden; background: #e6e9f0; border-radius: 8px; }
    .skel::after {
      content: ""; position: absolute; inset: 0; transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.65), transparent);
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 100% { transform: translateX(100%); } }
    @media (prefers-reduced-motion: reduce) { .skel::after { animation: none; } }
    .skel-logo { height: 64px; width: 64px; border-radius: 14px; margin: 0 auto 16px; }
    .skel-line { height: 16px; margin: 0 auto 10px; }
    .skel-name { height: 30px; width: 60%; }
    .skel-tag { height: 15px; width: 78%; }
    .skel-btn { height: 46px; width: 190px; border-radius: 12px; margin: 6px auto 0; }
    .skel-card { height: 118px; border-radius: 14px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <img id="logo" class="hero__logo" alt="" hidden />
      <div id="hero-skel">
        <div class="skel skel-logo"></div>
        <div class="skel skel-line skel-name"></div>
        <div class="skel skel-line skel-tag"></div>
        <div class="skel skel-btn"></div>
      </div>
      <h1 id="name" class="hero__name" hidden></h1>
      <p id="tag" class="hero__tag" hidden></p>
      <div id="book-cta"></div>
      <img data-storecal="cover" class="cover__img" alt="" />
      <div id="links" class="links"></div>
    </header>
    <div id="sections">
      <section class="sect">
        <h2 class="sect__title">Services</h2>
        <div class="skel skel-card"></div>
        <div class="skel skel-card"></div>
        <div class="skel skel-card"></div>
      </section>
    </div>
    <p class="foot">Powered by StoreCal</p>
  </main>

  <script>
    (function () {
      // Resolve the store from the slug in the path (/book/<slug>) or the legacy
      // ?key= form, so old shared links keep working.
      var m = location.pathname.replace(/\/+$/, "").match(/\/book\/([^/]+)/);
      var slug = m ? decodeURIComponent(m[1]) : null;
      var key = new URLSearchParams(location.search).get("key");
      var sections = document.getElementById("sections");
      var heroSkel = document.getElementById("hero-skel");
      function fail(msg) { heroSkel.hidden = true; sections.innerHTML = '<p class="err">' + msg + "</p>"; }

      if (!slug && !key) { fail("This booking link is missing its store."); return; }
      var q = slug ? "slug=" + encodeURIComponent(slug) : "key=" + encodeURIComponent(key);

      fetch("/api/shop-config?" + q)
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (d) {
          if (!d || !d.shop) { fail("Sorry, we couldn’t find this store."); return; }
          var shop = d.shop;
          // Custom logo/color/tagline only apply when the branding add-on is unlocked.
          var unlocked = shop.brandingUnlocked === true;
          var accent = (unlocked && shop.accent) ? shop.accent : "#2563eb";
          var storeKey = shop.publicKey;

          // Branding — swap the hero skeleton for the real header.
          document.documentElement.style.setProperty("--accent", accent);
          document.title = "Book · " + (shop.name || "StoreCal");
          var nameEl = document.getElementById("name");
          nameEl.textContent = shop.name || "Book an appointment";
          nameEl.hidden = false;
          if (unlocked && shop.tagline) { var t = document.getElementById("tag"); t.textContent = shop.tagline; t.hidden = false; }
          if (unlocked && shop.logo) { var lg = document.getElementById("logo"); lg.src = shop.logo; lg.hidden = false; }
          heroSkel.hidden = true;

          // storecal-data.js drops an announcement banner at the top of the page.
          // When one's active, pad the content down so the name isn't cramped.
          if (d.announcement) document.body.classList.add("has-banner");

          // Optional external links (link-in-bio / linktree style).
          var links = Array.isArray(shop.links) ? shop.links : [];
          if (links.length) {
            document.getElementById("links").innerHTML = links.map(function (l) {
              var url = String(l.url || ""); var label = String(l.label || url);
              if (!/^https?:\/\//i.test(url)) url = "https://" + url;
              return '<a href="' + url.replace(/"/g, "%22") + '" target="_blank" rel="noopener">' + esc(label) + "</a>";
            }).join("");
          }

          if (!storeKey) { fail("This store isn’t set up for online booking yet."); return; }

          // Build sections, respecting the owner's chosen order (Services / Our
          // work / Our team). Services + team are filled by storecal-data.js; Our
          // work is a custom tabbed gallery (below).
          var skelCards = '<div class="skel skel-card"></div><div class="skel skel-card"></div><div class="skel skel-card"></div>';
          var galleryOn = d.showGallery !== false;
          var blocks = {
            services: (d.services || []).length
              ? '<section class="sect"><h2 class="sect__title">Services</h2><div data-storecal="services">' + skelCards + '</div></section>' : "",
            gallery: galleryOn
              ? '<section class="sect" id="sect-gallery"><h2 class="sect__title">Our work</h2><div id="ourwork"></div></section>' : "",
            team: (d.showStaff !== false && (d.providers || []).length)
              ? '<section class="sect"><h2 class="sect__title">Our team</h2><div data-storecal="staff">' + skelCards + '</div></section>' : "",
          };
          var order = (Array.isArray(shop.sectionOrder) && shop.sectionOrder.length) ? shop.sectionOrder : ["services", "gallery", "team"];
          var seen = {}, html = "";
          order.forEach(function (k) { if (blocks[k] && !seen[k]) { html += blocks[k]; seen[k] = 1; } });
          ["services", "gallery", "team"].forEach(function (k) { if (blocks[k] && !seen[k]) { html += blocks[k]; seen[k] = 1; } });
          sections.innerHTML = html;

          // storecal-data.js fills the service/team containers + cover; embed.js
          // renders the accent Book button into #book-cta and wires every Book CTA.
          function addScript(src, attrs) {
            var s = document.createElement("script");
            s.src = src;
            Object.keys(attrs).forEach(function (k) { s.setAttribute(k, attrs[k]); });
            document.body.appendChild(s);
          }
          addScript("/storecal-data.js", { "data-store": storeKey, "data-accent": accent });
          addScript("/embed.js", { "data-store": storeKey, "data-accent": accent, "data-button-text": "Book an appointment", "data-target": "#book-cta" });

          if (galleryOn) buildOurWork(storeKey, d.providers || []);
          enhanceServiceCards();
        })
        .catch(function () { fail("Something went wrong loading this store."); });

      // Turn each rendered service card into the booking target: copy the service
      // id onto the card (embed.js wires [data-storecal-book] clicks) and add the
      // "Book →" hover cue. The per-service button is hidden via CSS.
      function enhanceServiceCards() {
        var host = document.querySelector('[data-storecal="services"]');
        if (!host) return;
        var apply = function () {
          host.querySelectorAll(".scd-card").forEach(function (card) {
            if (card.dataset.enhanced) return;
            var btn = card.querySelector(".scd-card__book");
            var svc = btn && btn.getAttribute("data-service");
            if (!svc) return;
            card.setAttribute("data-storecal-book", "");
            card.setAttribute("data-service", svc);
            card.dataset.enhanced = "1";
            var badge = document.createElement("span");
            badge.className = "scd-book-badge"; badge.textContent = "Book →";
            card.appendChild(badge);
          });
        };
        var obs = new MutationObserver(apply);
        obs.observe(host, { childList: true });
        setTimeout(function () { apply(); obs.disconnect(); }, 4000);
      }

      // "Our work": tabs for All + each staff member with photos; a 6-photo
      // preview per tab with a "Show all" toggle.
      function buildOurWork(key, providers) {
        var host = document.getElementById("ourwork");
        var sect = document.getElementById("sect-gallery");
        if (!host) return;
        Promise.all([
          fetch("/api/gallery?key=" + encodeURIComponent(key)).then(function (r) { return r.json(); }).catch(function () { return []; }),
          fetch("/api/gallery?scope=staff&key=" + encodeURIComponent(key)).then(function (r) { return r.json(); }).catch(function () { return []; }),
        ]).then(function (res) {
          var shopPhotos = (Array.isArray(res[0]) ? res[0] : []).filter(function (g) { return !g.cover; });
          var staffPhotos = Array.isArray(res[1]) ? res[1] : [];
          var byProv = {};
          staffPhotos.forEach(function (g) { if (g.providerId) (byProv[g.providerId] = byProv[g.providerId] || []).push(g); });
          var all = shopPhotos.concat(staffPhotos);
          if (!all.length) { if (sect) sect.style.display = "none"; return; }
          var groups = [{ label: "All", photos: all }];
          providers.forEach(function (p) { var ph = byProv[p._id]; if (ph && ph.length) groups.push({ label: p.name, photos: ph }); });
          if (groups.length <= 1) renderGrid(host, all);   // no per-staff photos → plain grid
          else renderTabs(host, groups);
        });
      }
      function renderGrid(container, photos) {
        var showAll = false;
        function paint() {
          container.innerHTML = "";
          var grid = document.createElement("div"); grid.className = "ggrid";
          (showAll ? photos : photos.slice(0, 6)).forEach(function (g) {
            var fig = document.createElement("figure"); fig.className = "gshot";
            var img = document.createElement("img"); img.src = g.url; img.loading = "lazy"; img.alt = g.caption || "";
            fig.appendChild(img); grid.appendChild(fig);
          });
          container.appendChild(grid);
          if (photos.length > 6 && !showAll) {
            var sa = document.createElement("button"); sa.className = "showall"; sa.type = "button";
            sa.textContent = "Show all " + photos.length + " photos";
            sa.onclick = function () { showAll = true; paint(); };
            container.appendChild(sa);
          }
        }
        paint();
      }
      function renderTabs(host, groups) {
        var active = 0;
        var bar = document.createElement("div"); bar.className = "gtabs";
        var body = document.createElement("div");
        host.innerHTML = ""; host.appendChild(bar); host.appendChild(body);
        function paint() {
          bar.innerHTML = "";
          groups.forEach(function (g, i) {
            var b = document.createElement("button");
            b.type = "button"; b.className = "gtab" + (i === active ? " is-active" : "");
            b.textContent = g.label;
            b.onclick = function () { active = i; paint(); };
            bar.appendChild(b);
          });
          renderGrid(body, groups[active].photos);
        }
        paint();
      }

      function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); }
    })();
  </script>
</body>
</html>

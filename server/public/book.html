<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Book an appointment</title>
  <style>
    :root { --accent: #2563eb; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; color: #111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(160deg, #eef2fb 0%, #f6f7f9 100%);
      padding: 40px 20px 56px;
    }
    .wrap { max-width: 640px; margin: 0 auto; }
    /* When the announcement banner is showing, give the store name breathing room. */
    body.has-banner .wrap { padding-top: 100px; }
    .hero { text-align: center; margin-bottom: 8px; }
    .hero__logo { max-height: 84px; max-width: 220px; margin: 0 auto 16px; display: block; border-radius: 14px; }
    .hero__logo[hidden] { display: none; }
    .hero__name { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 6px; }
    .hero__tag { font-size: 15.5px; color: #5a6069; margin: 0 auto 22px; max-width: 480px; line-height: 1.5; }
    #book-cta { display: flex; justify-content: center; margin-bottom: 18px; min-height: 46px; }
    .links { display: flex; flex-direction: column; gap: 10px; margin: 0 0 4px; }
    .links a {
      display: block; text-align: center; text-decoration: none; font-weight: 600; font-size: 15px;
      padding: 14px 18px; border-radius: 12px; border: 1px solid #e4e7ee; background: #fff; color: #1a1c22;
      box-shadow: 0 1px 2px rgba(16, 18, 28, 0.05); transition: transform .08s ease, border-color .12s ease, box-shadow .12s ease;
    }
    .links a:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(16, 18, 28, 0.08); }
    .sect { margin-top: 34px; }
    .sect__title {
      font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em;
      color: #6b7280; margin: 0 0 14px; padding-bottom: 8px; border-bottom: 1px solid #e6e8ec;
    }
    .foot { margin-top: 40px; text-align: center; font-size: 12px; color: #aab0b8; }
    .err { text-align: center; font-size: 14.5px; color: #c0392b; margin-top: 24px; }

    /* Tune the shared storecal-data.js widgets to sit nicely on this page. */
    .storecal-widget { display: flex; justify-content: center; }
    [data-storecal="services"].scd-grid,
    [data-storecal="staff"].scd-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 520px) {
      [data-storecal="staff"].scd-grid { grid-template-columns: 1fr 1fr; }
    }
    [data-storecal="services"] .scd-card__book { background: var(--accent); }
    /* Card components on white so they read clearly on the tinted page. */
    [data-storecal="services"] .scd-card,
    [data-storecal="staff"] .scd-person {
      background: #fff; border: 1px solid #e6e8ec; border-radius: 14px;
      box-shadow: 0 1px 2px rgba(16, 18, 28, 0.04);
    }
    /* Cover photo in the hero. Hidden until storecal-data.js sets its src. */
    .cover__img { display: none; width: 100%; max-height: 240px; object-fit: cover; border-radius: 16px; margin: 0 0 20px; }
    .cover__img[src] { display: block; }
    /* "Show all" toggle under the gallery preview. */
    .showall { display: block; margin: 14px auto 0; padding: 10px 20px; border: 1px solid var(--accent);
      background: #fff; color: var(--accent); border-radius: 10px; font: inherit; font-size: 14px; font-weight: 600; cursor: pointer; }
    .showall:hover { background: var(--accent); color: #fff; }
    @media (max-width: 560px) {
      body { padding: 24px 14px 48px; }
      .hero__name { font-size: 26px; }
      .sect { margin-top: 26px; }
      .cover__img { max-height: 180px; }
    }

    /* Skeleton loaders — shown until real content arrives. */
    .skel { position: relative; overflow: hidden; background: #e6e9f0; border-radius: 8px; }
    .skel::after {
      content: ""; position: absolute; inset: 0; transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.65), transparent);
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 100% { transform: translateX(100%); } }
    @media (prefers-reduced-motion: reduce) { .skel::after { animation: none; } }
    .skel-logo { height: 64px; width: 64px; border-radius: 14px; margin: 0 auto 16px; }
    .skel-line { height: 16px; margin: 0 auto 10px; }
    .skel-name { height: 30px; width: 60%; }
    .skel-tag { height: 15px; width: 78%; }
    .skel-btn { height: 46px; width: 190px; border-radius: 12px; margin: 6px auto 0; }
    .skel-card { height: 118px; border-radius: 14px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <img data-storecal="cover" class="cover__img" alt="" />
      <img id="logo" class="hero__logo" alt="" hidden />
      <div id="hero-skel">
        <div class="skel skel-logo"></div>
        <div class="skel skel-line skel-name"></div>
        <div class="skel skel-line skel-tag"></div>
        <div class="skel skel-btn"></div>
      </div>
      <h1 id="name" class="hero__name" hidden></h1>
      <p id="tag" class="hero__tag" hidden></p>
      <div id="book-cta"></div>
      <div id="links" class="links"></div>
    </header>
    <div id="sections">
      <section class="sect">
        <h2 class="sect__title">Services</h2>
        <div class="skel skel-card"></div>
        <div class="skel skel-card"></div>
        <div class="skel skel-card"></div>
      </section>
    </div>
    <p class="foot">Powered by StoreCal</p>
  </main>

  <script>
    (function () {
      // Resolve the store from the slug in the path (/book/<slug>) or the legacy
      // ?key= form, so old shared links keep working.
      var m = location.pathname.replace(/\/+$/, "").match(/\/book\/([^/]+)/);
      var slug = m ? decodeURIComponent(m[1]) : null;
      var key = new URLSearchParams(location.search).get("key");
      var sections = document.getElementById("sections");
      var heroSkel = document.getElementById("hero-skel");
      function fail(msg) { heroSkel.hidden = true; sections.innerHTML = '<p class="err">' + msg + "</p>"; }

      if (!slug && !key) { fail("This booking link is missing its store."); return; }
      var q = slug ? "slug=" + encodeURIComponent(slug) : "key=" + encodeURIComponent(key);

      fetch("/api/shop-config?" + q)
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (d) {
          if (!d || !d.shop) { fail("Sorry, we couldn’t find this store."); return; }
          var shop = d.shop;
          // Custom logo/color/tagline only apply when the branding add-on is unlocked.
          var unlocked = shop.brandingUnlocked === true;
          var accent = (unlocked && shop.accent) ? shop.accent : "#2563eb";
          var storeKey = shop.publicKey;

          // Branding — swap the hero skeleton for the real header.
          document.documentElement.style.setProperty("--accent", accent);
          document.title = "Book · " + (shop.name || "StoreCal");
          var nameEl = document.getElementById("name");
          nameEl.textContent = shop.name || "Book an appointment";
          nameEl.hidden = false;
          if (unlocked && shop.tagline) { var t = document.getElementById("tag"); t.textContent = shop.tagline; t.hidden = false; }
          if (unlocked && shop.logo) { var lg = document.getElementById("logo"); lg.src = shop.logo; lg.hidden = false; }
          heroSkel.hidden = true;

          // storecal-data.js drops an announcement banner at the top of the page.
          // When one's active, pad the content down so the name isn't cramped.
          if (d.announcement) document.body.classList.add("has-banner");

          // Optional external links (link-in-bio / linktree style).
          var links = Array.isArray(shop.links) ? shop.links : [];
          if (links.length) {
            document.getElementById("links").innerHTML = links.map(function (l) {
              var url = String(l.url || ""); var label = String(l.label || url);
              if (!/^https?:\/\//i.test(url)) url = "https://" + url;
              return '<a href="' + url.replace(/"/g, "%22") + '" target="_blank" rel="noopener">' + esc(label) + "</a>";
            }).join("");
          }

          if (!storeKey) { fail("This store isn’t set up for online booking yet."); return; }

          // Build only the sections that will have content; each gets skeleton
          // cards until storecal-data.js fills it.
          var skelCards = '<div class="skel skel-card"></div><div class="skel skel-card"></div><div class="skel skel-card"></div>';
          var galleryOn = d.showGallery !== false;
          var html = "";
          if ((d.services || []).length)
            html += '<section class="sect"><h2 class="sect__title">Services</h2><div data-storecal="services">' + skelCards + '</div></section>';
          // Our work (gallery) always sits above Our team.
          if (galleryOn)
            html += '<section class="sect" id="sect-gallery"><h2 class="sect__title">Our work</h2><div data-storecal="gallery"></div></section>';
          if (d.showStaff !== false && (d.providers || []).length)
            html += '<section class="sect"><h2 class="sect__title">Our team</h2><div data-storecal="staff">' + skelCards + '</div></section>';
          sections.innerHTML = html;

          // storecal-data.js fills the containers (replacing the skeletons); embed.js
          // renders the accent Book button into #book-cta and wires every Book CTA.
          function addScript(src, attrs, onload) {
            var s = document.createElement("script");
            s.src = src;
            Object.keys(attrs).forEach(function (k) { s.setAttribute(k, attrs[k]); });
            if (onload) s.onload = onload;
            document.body.appendChild(s);
          }
          addScript("/storecal-data.js", { "data-store": storeKey, "data-accent": accent });
          addScript("/embed.js", { "data-store": storeKey, "data-accent": accent, "data-button-text": "Book an appointment", "data-target": "#book-cta" });

          // Gallery: hide the section if empty; otherwise preview 6 photos with a
          // "Show all" toggle.
          if (galleryOn) {
            var sect = document.getElementById("sect-gallery");
            var g = sect && sect.querySelector('[data-storecal="gallery"]');
            var check = function () {
              if (!sect || !g) return;
              var n = g.children.length;
              sect.style.display = n ? "" : "none";
              if (n > 6 && !sect.querySelector(".showall")) {
                for (var i = 6; i < n; i++) g.children[i].style.display = "none";
                var btn = document.createElement("button");
                btn.className = "showall"; btn.type = "button";
                btn.textContent = "Show all " + n + " photos";
                btn.onclick = function () {
                  for (var j = 0; j < g.children.length; j++) g.children[j].style.display = "";
                  btn.remove();
                };
                sect.appendChild(btn);
              }
            };
            if (g) { var obs = new MutationObserver(check); obs.observe(g, { childList: true }); setTimeout(function () { check(); obs.disconnect(); }, 4000); }
          }
        })
        .catch(function () { fail("Something went wrong loading this store."); });

      function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); }
    })();
  </script>
</body>
</html>
